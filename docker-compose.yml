version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: phptest
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql
      # - ./phptest_project.sql:/docker-entrypoint-initdb.d/1.sql
      # - ./dockerfiles/mysql/init.sql:/docker-entrypoint-initdb.d/2-grant.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      timeout: 20s
      retries: 3

  app:
    build:
      context: ./dockerfiles/php
      dockerfile: Dockerfile
    container_name: app
    depends_on:
      - db
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www/html
      - ./dockerfiles/apache/000-default.conf:/etc/apache2/sites-available/000-default.conf
      # - ./apache/ssl:/etc/apache2/ssl
    environment:
      PHP_INI_DIR: /usr/local/etc/php
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root_password
    volumes:
      - /sessions

volumes:
  db_data: